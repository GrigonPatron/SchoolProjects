services:
  server:
    build: ../Part5/
    networks:
      - mini_server_network

  proxy-nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
    networks:
      - mini_server_network

networks:
  mini_server_network:
    driver: bridge